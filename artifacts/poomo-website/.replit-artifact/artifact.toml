kind = "web"
previewPath = "/"
title = "Poomo Website"
version = "1.0.0"
id = "artifacts/poomo-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19198

[services.development]
run = "pnpm --filter @workspace/poomo-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poomo-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/poomo-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19198"
BASE_PATH = "/"
